<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>마카샤 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
            /* 터치 시 지연 및 하이라이트 제거 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        /* 메인 UI 레이어 최적화 */
        #ui-layer {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* 요소들을 위아래로 분산 */
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            z-index: 100;
        }

        .score-container {
            border: 4px solid #8FC1B5;
            background-color: white;
            width: 90%; /* 모바일 대응 너비 */
            max-width: 320px;
        }

        /* 클릭 대상 크기 최적화 */
        .click-target {
            max-width: 70vw; /* 화면의 70%를 넘지 않게 */
            aspect-ratio: 1/1;
            object-fit: contain;
            transition: transform 0.05s cubic-bezier(0, 0, 0.2, 1);
            will-change: transform;
        }

        /* 떨어지는 아이템 애니메이션 (하드웨어 가속) */
        .falling-item {
            position: absolute;
            top: -60px;
            width: 60px; /* 모바일용 크기 축소 */
            pointer-events: none;
            z-index: 50;
            will-change: transform;
        }
        @keyframes fall {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate3d(0, calc(100vh + 100px), 0) rotate(360deg); opacity: 0; }
        }

        /* 하단 업그레이드 영역 고정 */
        .upgrade-section {
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(240,242,245,1) 80%, rgba(240,242,245,0));
        }

        .upgrade-btn {
            background-color: white;
            border: 2px solid #8FC1B5;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        /* 부동산 탭 모바일 너비 조정 */
        #estate-tab {
            position: fixed; right: -85%; top: 0;
            width: 80%; height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 200;
            padding: 20px;
        }
        #estate-tab.open { right: 0; }
    </style>
</head>
<body>

    <div id="rank-toast">랭크 업! ✨</div>

    <div id="estate-tab">
        <div id="estate-toggle">부동산</div>
        <h2 class="text-xl font-bold mb-6 text-gray-800 border-b-2 border-[#8FC1B5] pb-2">부동산 매물</h2>
        <div id="estate-list" class="overflow-y-auto h-[90%]"></div>
    </div>

    <div id="ui-layer">
        <div class="score-container mt-6 p-4 rounded-2xl shadow-lg text-center">
            <div class="text-sm font-bold text-gray-400 mb-1">이-히힛! 포인트</div>
            <div id="score" class="text-4xl font-black text-[#8FC1B5]">0</div>
            <div class="mt-1 flex justify-center gap-3 text-xs font-bold text-gray-400">
                <span>클릭: +<span id="display-click">1</span></span>
                <span>초당: +<span id="display-auto">0</span></span>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center">
            <img id="danceButton" src="resources/dancing.gif" alt="dancing" class="click-target rounded-2xl">
        </div>

        <div class="upgrade-section flex flex-col gap-3">
            <button id="upgrade1" class="upgrade-btn p-3 rounded-xl font-bold shadow-sm">
                <div class="text-sm">근력 강화 (Lv.<span id="lv1">0</span>)</div>
                <div class="text-[10px] text-blue-500" id="rank-info">다음 랭크까지: 25 Lv</div>
                <div class="text-xs">비용: <span id="cost1">100</span>P</div>
            </button>
            <button id="upgrade2" class="upgrade-btn p-3 rounded-xl font-bold shadow-sm">
                <div class="text-sm">새로운 결말 (Lv.<span id="lv2">0</span>)</div>
                <div class="text-xs">비용: <span id="cost2">100</span>P</div>
            </button>
            <button id="open-modal" class="py-2 text-xs text-gray-400 font-bold">설명 보기</button>
        </div>
    </div>

    <script>
    // JS 로직은 기존과 동일하되, 터치 이벤트 최적화
    const danceBtn = document.getElementById('danceButton');
    
    // 모바일 터치 중복 방지 로직 추가
    let lastTouchTime = 0;
    danceBtn.addEventListener('touchstart', (e) => {
        const now = Date.now();
        if (now - lastTouchTime < 30) return; // 너무 빠른 중복 터치 방지 (성능 보호)
        lastTouchTime = now;
        
        e.preventDefault();
        score += getClickPower();
        playClickSound();
        spawnFallingItem();
        requestUIUpdate();
    }, { passive: false });

    // 부동산 토글 모바일용 터치 이벤트 추가
    document.getElementById('estate-toggle').addEventListener('click', () => {
        document.getElementById('estate-tab').classList.toggle('open');
    });

    // ... 나머지 기존 JS 로직 유지 ...
    </script>
</body>
</html>
